<header>
    <a routerLink="" class="logo">
        <img src="assets/Logo.png" alt="Logo" />
        <span>SketchMuse</span>
    </a>

    <nav>
        @if (isLoggedIn) {
        <button routerLink="/me">Mi perfil</button>
        <button (click)="logout()">Logout</button>
        } @else {
        <button routerLink="/login">Login</button>
        <button routerLink="/register">Registro</button>
        }
    </nav>
</header>
