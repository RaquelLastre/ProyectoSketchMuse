<form (ngSubmit)="onSubmit()" #f="ngForm">
    <input type="email" [(ngModel)]="email" name="email" required placeholder="Email" />
    <input type="password" [(ngModel)]="password" name="password" required placeholder="Contraseña" />

    @if (error) {
    <p>{{ error }}</p>
    }

    <button type="submit">
        {{ tipo === 'login' ? 'Entrar' : 'Registrarse' }}
    </button>

    @if (tipo === 'login') {
    <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    } @else {
    <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    }
</form>
